server:
  port: ${PORT:8080}

spring:
  application:
    name: nexusflow-backend

  datasource:
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/nexusflow?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:6125}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 1200000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
        use_sql_comments: true
    open-in-view: false

  mvc:
    throw-exception-if-no-handler-found: true

  web:
    resources:
      add-mappings: false

# ─── JWT Configuration ────────────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET:NexusFlow@SuperSecretKey2024!MustBe256BitsOrMoreForHS256Algorithm}
  expiration: 86400000   # 24 hours in milliseconds

# ─── Logging ──────────────────────────────────────────────────────────────────
logging:
  level:
    com.nexusflow: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
